server:
  port: 9096
app:
  public-endpoints:
    - /auth/**
    - /users
    - /users/login
    - /order/public/**
spring:
  application:
    name: 2063401API-GateWay
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/product/**
          filters:
            - JwtFilter
            - AddRequestHeader=X-Gateway-Secret, mysecret

        - id: order-service
          uri: http://localhost:9090
          predicates:
            - Path=/orders/**
          filters:
            - JwtFilter
            - AddRequestHeader=X-Gateway-Secret, mysecret

        - id: user-service
          uri: http://localhost:9095
          predicates:
            - Path=/users/**
          filters:
            - JwtFilter
            - AddRequestHeader=X-Gateway-Secret, mysecret